<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="main.html" class="logo"><img src="/static/images/Logo.png" alt="Логотип"></a>
        </div>
        <div class="auth-buttons">
            <a href="enter.html" class="enter-button">Войти</a>
            <a href="#" class="register-button">Зарегистрироваться</a>
        </div>   
    </header>
    <main class="registration-container">
        <h1>Зарегистрируйся здесь</h1>
        <form class="registration-form" id="registerForm">
            <div class="input-container">
                <input type="text" id="login" name="login" placeholder="Логин" 
                autocomplete="username" required maxlength="15">
            </div>

            <div class="input-container">
                <input type="password" id="password" name="password" placeholder="Пароль" 
                autocomplete="new-password" required maxlength="30">
            </div>
            
            <button type="submit" class="registration-button" id="registerButton">Зарегистрироваться</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
    </main>
    <script src="/static/js/register.js"></script>
</body>
</html>
