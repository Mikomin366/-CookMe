<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/static/css/enter.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="main.html" class="logo"><img src="/static/images/Logo.png" alt="Логотип"></a>
        </div>
        <div class="auth-buttons">
            <a href="#" class="enter-button">Войти</a>
            <a href="register.html" class="register-button">Зарегистрироваться</a>
        </div>   
    </header>
    <main class="login-container">
        <h1>Войти</h1>
        <form class="login-form" id="loginForm">
            <div class="input-container">
                <input type="text" id="login" name="login" placeholder="Логин" 
                autocomplete="username" required maxlength="15">
            </div>

            <div class="input-container">
                <input type="password" id="password" name="password" placeholder="Пароль" 
                autocomplete="current-password" required maxlength="30">
            </div>

            <button type="submit" class="login-button" id="loginButton">Войти</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
    </main>
    <script src="/static/js/enter.js"></script>
</body>
</html>
