<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление рецепта</title>
    <link rel="stylesheet" href="/static/css/add-recipe.css">
</head>
<body>
    <header>
       <div class="logo">
            <a href="main.html" class="logo"><img src="/static/images/Logo.png"></a>
        </div>
        <div class="profile-icon" id="profileIcon">
            <img src="/static/images/Ellipse 21.png" class="profile-img" id="profileAvatar">
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="profile.html" class="dropdown-item">Профиль</a>
                <button class="dropdown-item" id="editProfileInDropdownBtn">Редактировать</button>
                <button class="dropdown-item" id="logoutBtn">Выйти</button>
            </div>
        </div> 
    </header>
    
    <h1 class="tl">Добавление рецепта</h1>
    
    <main class="information-container">
        <div class="image-wrapper">
            <div class="image-label">Блюдо</div>
            <div class="recipe-image-box" id="imageBox">
                <div class="placeholder">Нажмите для выбора фото</div>
            </div>
            <div class="ingredients-wrapper">
                <div class="form-field ingredients-field">
                    <label>Ингредиенты</label>
                    <div id="ingredientsList" class="ingredients-list"></div>
                </div>
                <button class="ingredient-add-button" id="addIngredientButton">
                    <img src="/static/images/plus.png" alt="Добавить">
                </button>
            </div>
        </div>
        
        <div class="recipe-form-fields">
            <div class="form-field">
                <label>Название рецепта</label>
                <input type="text" id="recipeName" placeholder="Введите название рецепта">
            </div>
            
            <div class="form-field">
                <label>Категории</label>
                <div class="categories-input">
                    <input type="text" id="category1" placeholder="Категория 1">
                    <input type="text" id="category2" placeholder="Категория 2">
                </div>
            </div>
            
            <div class="form-field">
                <label>Время готовки (мин.)</label>
                <input type="number" id="cookingTime" placeholder="Введите время готовки" min="0" step="1" value="0">
            </div>
            
            <div class="form-field">
                <label>Калории</label>
                <input type="number" id="calories" placeholder="Введите количество калорий" min="0" step="1" value="0">
            </div>
            
            <div class="form-field">
                <label>Краткое описание</label>
                <textarea id="description" placeholder="Введите краткое описание рецепта"></textarea>
            </div>
            
            <div class="steps-section">
                <div class="steps-header">
                    <label>Пошаговый рецепт</label>
                    <button class="add-step-button" id="addStepButton">
                        <img src="/static/images/plus.png" alt="Добавить шаг">
                    </button>
                </div>
                <div id="stepsContainer" class="steps-list"></div>
            </div>
            
            <div class="action-container">
                <button class="action-button add-recipe-button" id="addRecipeButton">Добавить рецепт</button>
            </div>
        </div>
    </main>

    <!-- Модальное окно для редактирования профиля -->
    <div class="profile-modal-overlay" id="editProfileModal">
        <div class="profile-modal-container">
            <div class="profile-modal-header">
                <h2>Редактировать профиль</h2>
                <button class="profile-modal-close" id="closeProfileModalBtn">&times;</button>
            </div>
            <div class="profile-modal-body">
                <div class="avatar-section">
                    <img id="modalAvatarPreview" class="current-avatar-large" src="images/Ellipse 21.png" alt="Аватар">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button class="avatar-upload-btn" id="uploadAvatarBtn">Загрузить фото</button>
                </div>
                <div class="profile-form-field">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль">
                </div>
                <div class="profile-form-field">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" placeholder="Введите новый пароль">
                </div>
                <div class="profile-form-field">
                    <label>Подтвердите новый пароль</label>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                </div>
            </div>
            <div class="profile-modal-footer">
                <button class="profile-modal-btn profile-modal-btn-cancel" id="cancelProfileModalBtn">Отмена</button>
                <button class="profile-modal-btn profile-modal-btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
        </div>
    </div>
    <script src="/static/js/add-recipe.js"></script>
</body>
</html>
