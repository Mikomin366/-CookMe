<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="#" class="logo"><img src="/static/images/Logo.png"></a>
        </div>
        <div class="filter-group">
            <select id="sortFilter" class="filter-select">
                <option value="default">Фильтр</option>
                <option value="time_asc">Меньше по времени</option>
                <option value="time_desc">Больше по времени</option>
                <option value="name_asc">Сортировка в алфавитном порядке</option>
                <option value="calories_asc">Сортировка по калориям</option>
                <option value="favorite_first">Сначала избранные</option>
            </select>
        </div>
        <div class="search-group">
            <input type="text" id="searchInput" class="search-input" placeholder="Поисковая строка">
        </div>
        
        <div class="auth-buttons" id="authButtons">
            <a href="enter.html" class="enter-button">Войти</a>
            <a href="register.html" class="register-button">Зарегистрироваться</a>
        </div>
        
        <div class="profile-icon" id="profileIcon" style="display: none;">
            <img src="images/Ellipse 21.png" class="profile-img" id="profileAvatar">
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="profile.html" class="dropdown-item">Профиль</a>
                <button class="dropdown-item" id="editProfileBtn">Редактировать</button>
                <button class="dropdown-item" id="logoutBtnMain">Выйти</button>
            </div>
        </div>
    </header>
    
    <div class="main-layout">
        <!-- Левый контейнер "Рецепт дня" -->
        <div class="recipe-day-container">
            <div class="recipe-day-title">Рецепт-дня</div>
            <div class="recipe-day-box" id="recipeOfTheDayBtn">
                <div class="day-decorative-circles">
                    <div class="day-outer-circle">
                        <div class="day-inner-circle"></div>
                    </div>
                </div>
                <div class="recipe-day-text">
                    <p>Нажми на меня,</p>
                    <p>сделай свой день</p>
                    <p>вкуснее</p>
                </div>
            </div>
        </div>
        
        <!-- Правый контейнер main-container -->
        <main class="main-container" id="mainContainer">
            <h1 class="catalog-title">Каталог рецептов</h1>
            
            <!-- Контейнер для карточек -->
            <div id="recipesContainer"></div>
        </main>
    </div>

    <!-- Модальное окно для редактирования профиля -->
    <div class="profile-modal-overlay" id="editProfileModal">
        <div class="profile-modal-container">
            <div class="profile-modal-header">
                <h2>Редактировать профиль</h2>
                <button class="profile-modal-close" id="closeProfileModalBtn">&times;</button>
            </div>
            <div class="profile-modal-body">
                <div class="avatar-section">
                    <img id="modalAvatarPreview" class="current-avatar-large" src="images/Ellipse 21.png" alt="Аватар">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button class="avatar-upload-btn" id="uploadAvatarBtn">Загрузить фото</button>
                </div>
                <div class="profile-form-field">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль">
                </div>
                <div class="profile-form-field">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" placeholder="Введите новый пароль">
                </div>
                <div class="profile-form-field">
                    <label>Подтвердите новый пароль</label>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                </div>
            </div>
            <div class="profile-modal-footer">
                <button class="profile-modal-btn profile-modal-btn-cancel" id="cancelProfileModalBtn">Отмена</button>
                <button class="profile-modal-btn profile-modal-btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
        </div>
    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
