<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="/static/css/profile.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="main.html" class="logo"><img src="/static/images/Logo.png"></a>
        </div>
        <div class="profile-icon" id="profileIcon">
            <img src="/static/images/Ellipse 21.png" class="profile-img" id="profileAvatar">
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="profile.html" class="dropdown-item">Профиль</a>
                <button class="dropdown-item" id="editProfileBtn">Редактировать</button>
                <button class="dropdown-item" id="logoutBtn">Выйти</button>
            </div>
        </div>
    </header>
    
    <h1 class="username" id="userName">Имя пользователя</h1>
    
    <main class="profile-container">
        <div class="profile-buttons">
            <button class="add-recipe-button" id="addRecipeButton">Добавить новый рецепт</button>
        </div>
        <div class="recipes-header">
            <h1 class="recipes-c" id="sectionTitle">Ваши рецепты</h1>
            <button class="favorite-button" id="favoriteButton">Избранное</button>
        </div>
        <div id="favoriteStatus" class="favorite-status"></div>
        <div id="recipesList" class="recipes-list"></div>
    </main>

    <!-- Модальное окно для редактирования профиля -->
    <div class="profile-modal-overlay" id="editProfileModal">
        <div class="profile-modal-container">
            <div class="profile-modal-header">
                <h2>Редактировать профиль</h2>
                <button class="profile-modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="profile-modal-body">
                <div class="avatar-section">
                    <img id="modalAvatarPreview" class="current-avatar-large" src="/static/images/Ellipse 21.png" alt="Аватар">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button class="avatar-upload-btn" id="uploadAvatarBtn">Загрузить фото</button>
                </div>
                <div class="profile-form-field">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль">
                </div>
                <div class="profile-form-field">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" placeholder="Введите новый пароль">
                </div>
                <div class="profile-form-field">
                    <label>Подтвердите новый пароль</label>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                </div>
            </div>
            <div class="profile-modal-footer">
                <button class="profile-modal-btn profile-modal-btn-cancel" id="cancelModalBtn">Отмена</button>
                <button class="profile-modal-btn profile-modal-btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
        </div>
    </div>
    <script src="/static/js/profile.js"></script>
</body>
</html>
