<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр рецепта</title>
    <link rel="stylesheet" href="/static/css/information.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="main.html" class="logo"><img src="/static/images/Logo.png" alt="Логотип"></a>
        </div>
        
        <div class="auth-buttons" id="authButtons">
            <a href="enter.html" class="enter-button">Войти</a>
            <a href="register.html" class="register-button">Зарегистрироваться</a>
        </div>
        
        <div class="profile-icon" id="profileIcon" style="display: none;">
            <img src="/static/images/Ellipse 21.png" class="profile-img" id="profileAvatar">
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="profile.html" class="dropdown-item">Профиль</a>
                <button type="button" class="dropdown-item" id="editProfileBtn">Редактировать</button>
                <button class="dropdown-item" id="logoutBtnInfo">Выйти</button>
            </div>
        </div>
    </header>
    
    <h1 class="tl">Просмотр рецепта</h1>
    
    <main class="information-container">
        <div class="image-wrapper">
            <div class="image-label">Блюдо</div>
            <div class="recipe-image-box" id="imageBox">
                <div class="placeholder">Изображение отсутствует</div>
            </div>
            <div class="ingredients-wrapper">
                <div class="form-field ingredients-field">
                    <label>Ингредиенты</label>
                    <div id="ingredientsList" class="ingredients-list"></div>
                </div>
            </div>
        </div>
        
        <div class="recipe-form-fields">
            <div class="form-field">
                <label>Название рецепта</label>
                <div class="field-value" id="recipeName">Загрузка...</div>
            </div>
            
            <div class="form-field">
                <label>Категории</label>
                <div class="field-value" id="categories">Загрузка...</div>
            </div>
            
            <div class="form-field">
                <label>Время готовки (мин.)</label>
                <div class="field-value" id="cookingTime">Загрузка...</div>
            </div>
            
            <div class="form-field">
                <label>Калории</label>
                <div class="field-value" id="calories">Загрузка...</div>
            </div>
            
            <div class="form-field">
                <label>Краткое описание</label>
                <div class="field-value" id="description">Загрузка...</div>
            </div>
            
            <div class="steps-section">
                <div class="steps-header">
                    <label>Пошаговый рецепт</label>
                </div>
                <div id="stepsContainer" class="steps-list"></div>
            </div>
            
            <div class="button-container">
                <a href="#" class="action-button edit-button" id="editButton" style="display: none;">Редактировать</a>
                <button class="action-button chef-button" id="chefButton">Режим шеф-повара</button>
                <button class="export-button" id="exportPdfBtn">Выгрузить PDF</button>
            </div>
        </div>
    </main>

    <div class="profile-modal-overlay" id="editProfileModal">
        <div class="profile-modal-container">
            <div class="profile-modal-header">
                <h2>Редактировать профиль</h2>
                <button class="profile-modal-close" id="closeProfileModalBtn">&times;</button>
            </div>
            <div class="profile-modal-body">
                <div class="avatar-section">
                    <img id="modalAvatarPreview" class="current-avatar-large" src="/static/images/Ellipse 21.png" alt="Аватар">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button class="avatar-upload-btn" id="uploadAvatarBtn">Загрузить фото</button>
                </div>
                <div class="profile-form-field">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль">
                </div>
                <div class="profile-form-field">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" placeholder="Введите новый пароль">
                </div>
                <div class="profile-form-field">
                    <label>Подтвердите новый пароль</label>
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                </div>
            </div>
            <div class="profile-modal-footer">
                <button class="profile-modal-btn profile-modal-btn-cancel" id="cancelProfileModalBtn">Отмена</button>
                <button class="profile-modal-btn profile-modal-btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
        </div>
    </div>
    <script src="/static/js/information.js"></script>
</body>
</html>
