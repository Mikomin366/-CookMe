{% extends 'recipes/base.html' %}
{% block title %}Удаление рецепта{% endblock %}

{% block content %}
<h2>Удаление рецепта "{{ recipe.name }}"</h2>
<p>Вы уверены, что хотите удалить этот рецепт?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'profile' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
